# =============================================================================
# iGEM-silk 微服务集群 — Docker Compose
# =============================================================================
#
# 从 tools/ 目录启动全部 9 个微服务:
#   cd tools && docker compose up -d
#
# 仅 GPU 服务:
#   docker compose --profile gpu up -d
#
# 仅 CPU 服务:
#   docker compose --profile cpu up -d
#
# 构建并启动:
#   docker compose up -d --build
#
# 查看状态:
#   docker compose ps
#
# 前提条件 (GPU 服务):
#   - NVIDIA 驱动 >= 525
#   - nvidia-container-toolkit
# =============================================================================

services:

  # ===========================================================================
  # GPU 加速服务 (profile: gpu)
  # ===========================================================================

  anoxpepred:
    build:
      context: ..
      dockerfile: AnOxPePred/Dockerfile
    image: igem-silk/anoxpepred:latest
    container_name: anoxpepred
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
    profiles: [gpu]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  bepipred3:
    build:
      context: ..
      dockerfile: BepiPred-3.0/Dockerfile
