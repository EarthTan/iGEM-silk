      - "8002:8002"
    environment:
      - PORT=8002
    volumes:
      - ./models:/app/tools/models  # 共享 ESM-2 模型缓存
    profiles: [gpu]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 60s

