      - "8202:8202"
    environment:
      - PORT=8202
      - PF4_IMAGE=${PF4_IMAGE:-pepfold4}
      - PF4_WORKSPACE=/tmp/pf4_workspace
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/pf4_workspace:/tmp/pf4_workspace
    profiles: [cpu]
    restart: unless-stopped
    healthcheck:
