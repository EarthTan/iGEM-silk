      retries: 5
      start_period: 30s

  # ===========================================================================
  # Structure Service (profile: gpu — needs Docker socket + host GPU)
  # ===========================================================================

  alphafold3:
    build:
      context: ..
      dockerfile: tools/AlphaFold3/Dockerfile
    image: igem-silk/alphafold3-api:latest
    container_name: alphafold3
    ports:
      - "8201:8201"
    environment:
      - PORT=8201
      - AF3_IMAGE=${AF3_IMAGE:-alphafold3}
      - AF3_MODEL_DIR=/root/models
      - AF3_DATABASE_DIR=/root/public_databases
      - AF3_MODEL_HOST_DIR=${AF3_MODEL_DIR}
      - AF3_DATABASE_HOST_DIR=${AF3_DATABASE_DIR}
      - AF3_WORKSPACE=/tmp/af3_workspace
      - JOBS_FILE=/tmp/af3_jobs/jobs.json
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${AF3_MODEL_DIR:-/tmp/af3_models}:/root/models
      - ${AF3_DATABASE_DIR:-/tmp/af3_databases}:/root/public_databases
      - /tmp/af3_workspace:/tmp/af3_workspace
      - /tmp/af3_jobs:/tmp/af3_jobs
    profiles: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8201/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  pepfold4:
    build:
      context: ..
